server:
  port: 8086
spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/restromind
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: restromind_notification
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
