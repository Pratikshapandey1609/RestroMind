spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: restromind_auth
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: restromind-super-secret-key-change-in-production-min-32-chars
  access-token-ttl-ms: 900000
  refresh-token-ttl-ms: 604800000
