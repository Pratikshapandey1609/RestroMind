server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: restaurant-service
          uri: http://localhost:8082
          predicates:
            - Path=/restaurants/**

        - id: menu-service
          uri: http://localhost:8083
          predicates:
            - Path=/menu/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/orders/**

        - id: user-service
          uri: http://localhost:8085
          predicates:
            - Path=/users/**

        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/notifications/**

        - id: analytics-service
          uri: http://localhost:8087
          predicates:
            - Path=/analytics/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: restromind-super-secret-key-change-in-production-min-32-chars
  access-token-ttl-ms: 900000      # 15 minutes
  refresh-token-ttl-ms: 604800000  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info
